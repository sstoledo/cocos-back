services:
  postgres:
    image: postgres:16-alpine
    container_name: cocos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cocos
    ports:
      - "5432:5432"
    volumes:
      - cocos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cocos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cocos-postgres-data:
