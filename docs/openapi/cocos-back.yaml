openapi: 3.0.3
info:
  title: Cocos ERP Backend API
  description: |
    REST API for the Cocos mechanic-shop ERP.
    Auth endpoints are provided by better-auth under `/api/auth`.
  version: 0.0.1
  contact:
    name: Cocos Team
servers:
  - url: http://localhost:4000
    description: Local development server
tags:
  - name: Auth
    description: Session-based authentication via better-auth
  - name: Users
    description: User profile endpoints
  - name: Products
    description: Product catalog endpoints
paths:
  /api/auth/sign-up/email:
    post:
      summary: Register a new user with email and password
      description: Creates a user account and assigns the default `Reception` role.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: StrongPass123
                name:
                  type: string
                  example: Juan Pérez
      responses:
        '200':
          description: User registered and session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: better-auth session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRole'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/auth/sign-in/email:
    post:
      summary: Sign in with email and password
      description: Starts a session and returns user data with role.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: StrongPass123
                rememberMe:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Signed in successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: better-auth session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRole'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/sign-out:
    post:
      summary: Sign out the current user
      description: Invalidates the session cookie.
      tags:
        - Auth
      security:
        - betterAuthCookie: []
      responses:
        '200':
          description: Signed out successfully
          content:
            application/json:
              schema:
                type: object

  /api/auth/send-verification-email:
    post:
      summary: Request email verification
      description: Sends a verification email to the logged-in user. Requires an active session.
      tags:
        - Auth
      security:
        - betterAuthCookie: []
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/forget-password:
    post:
      summary: Request password reset email
      description: Sends a password reset link to the given email address.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: Reset email sent if account exists
          content:
            application/json:
              schema:
                type: object

  /api/auth/reset-password:
    post:
      summary: Reset password with token
      description: Sets a new password using the token received by email.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Reset token from the email link
                  example: abcdef123456
                newPassword:
                  type: string
                  minLength: 8
                  example: NewStrongPass123
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/me:
    get:
      summary: Get current authenticated user
      description: Returns the current user profile including their role. Requires any authenticated MVP role.
      tags:
        - Users
      security:
        - betterAuthCookie: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRole'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/products:
    get:
      summary: List and search products
      description: Returns the product catalog. Query parameters are accepted but currently ignored by the backend; all products are returned.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Free-text search term (reserved for future use)
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by active status (reserved for future use)
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a product
      description: Creates a new product. An optional image can be uploaded as multipart/form-data. Admin role required.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateProduct'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /api/products/{id}:
    get:
      summary: Get a product by ID
      description: Returns a single product by its ID. Any authenticated user can read.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a product
      description: Updates an existing product. An optional image can be uploaded to replace the current one. Admin role required.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProduct'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    delete:
      summary: Delete a product
      description: Removes the product and schedules Cloudinary image cleanup asynchronously. Admin role required.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/products/{id}/image:
    delete:
      summary: Remove a product image
      description: Clears the image fields from the product and schedules Cloudinary asset deletion. Admin role required.
      tags:
        - Products
      security:
        - betterAuthCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Image removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    CreateProduct:
      type: object
      required:
        - code
        - name
        - price
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          example: OIL-001
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Engine oil
        description:
          type: string
          maxLength: 2000
          example: Synthetic engine oil 5W-30
        price:
          type: string
          description: Positive decimal amount, serialized as a string
          example: '30.00'
        minStock:
          type: integer
          minimum: 0
          example: 10
        unit:
          type: string
          enum:
            - unit
            - liter
            - kg
            - piece
          example: liter
        isActive:
          type: boolean
          example: true
        image:
          type: string
          format: binary
          description: Optional product image (JPEG, PNG or WEBP, max 2 MB)

    UpdateProduct:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          example: OIL-001
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Engine oil
        description:
          type: string
          maxLength: 2000
        price:
          type: string
          description: Positive decimal amount, serialized as a string
          example: '35.00'
        minStock:
          type: integer
          minimum: 0
        unit:
          type: string
          enum:
            - unit
            - liter
            - kg
            - piece
        isActive:
          type: boolean
        image:
          type: string
          format: binary
          description: Optional replacement image (JPEG, PNG or WEBP, max 2 MB)

    ProductResponse:
      type: object
      properties:
        id:
          type: string
          example: product-1
        code:
          type: string
          example: OIL-001
        name:
          type: string
          example: Engine oil
        description:
          type: string
          example: Synthetic engine oil 5W-30
        price:
          type: string
          description: Decimal amount serialized as a string
          example: '30.00'
        minStock:
          type: integer
          example: 10
        unit:
          type: string
          enum:
            - unit
            - liter
            - kg
            - piece
          example: liter
        imageUrl:
          type: string
          format: uri
          example: https://res.cloudinary.example.com/products/fake.jpg
        imagePublicId:
          type: string
          example: products/fake-123
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
          example: role-1
        name:
          type: string
          enum:
            - Admin
            - Reception
            - Mechanic
            - Warehouse
            - Purchasing
            - ReadOnly
          example: Reception

    User:
      type: object
      properties:
        id:
          type: string
          example: user-1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Juan Pérez
        emailVerified:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserWithRole:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            role:
              $ref: '#/components/schemas/Role'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
        statusCode:
          type: integer

  securitySchemes:
    betterAuthCookie:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Session cookie set by better-auth after sign-in/sign-up.

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Resource conflict (e.g. duplicate product code)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    PayloadTooLarge:
      description: Request payload exceeds the allowed size
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnsupportedMediaType:
      description: File type is not supported
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
